# Server configuration
server.port=8080

# Database configurations
spring.datasource.url=jdbc:mysql://localhost:3306/cookverse_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate & JPA configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Servlet Upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application specific properties
# Path where recipe and profile pictures are stored (relative to root)
app.upload.dir=update

# JWT Security Configurations
# 256-bit secret key in base64: CookVerseAiAppSecretKeyMustBeAtLeast32BytesLongForHmacSha256Security
jwt.secret=CookVerseAiAppSecretKeyMustBeAtLeast32BytesLongForHmacSha256Security
# Token lifetime in milliseconds: 86400000ms = 24 Hours
jwt.expiration=86400000

# Groq API Configuration
groq.api.key=${GROQ_API_KEY:gsk_your_key_placeholder}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant
